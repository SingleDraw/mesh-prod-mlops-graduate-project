name: Databricks Pipeline CD

on:
  workflow_dispatch:

env:
  SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: ${{ vars.AML_RESOURCE_GROUP }}
  WORKSPACE: ${{ vars.AML_WORKSPACE_NAME }}
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

permissions:
  id-token: write
  contents: read
 
jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.ARM_CLIENT_ID }}
        tenant-id: ${{ secrets.ARM_TENANT_ID }}
        subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

    - uses: databricks/setup-cli@main

    - name: Set Databricks token
      run: |
        echo "DATABRICKS_TOKEN=$(az account get-access-token \
          --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
          --query accessToken -o tsv)" >> $GITHUB_ENV

    - name: Validate
      run: databricks bundle validate
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}

    - name: Deploy Bundle
      run: |
        databricks bundle deploy -t dev \
          --var="storage_account=${{ vars.DATALAKE_NAME }}" \
          --var="sp_client_id=${{ secrets.DATABRICKS_CLIENT_ID }}" \
          --var="sp_client_secret=${{ secrets.DATABRICKS_CLIENT_SECRET }}" \
          --var="tenant_id=${{ secrets.DATABRICKS_TENANT_ID }}"
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}


  run-pipeline-job:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.ARM_CLIENT_ID }}
        tenant-id: ${{ secrets.ARM_TENANT_ID }}
        subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

    - uses: databricks/setup-cli@main

    - name: Set Databricks token
      run: |
        echo "DATABRICKS_TOKEN=$(az account get-access-token \
          --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
          --query accessToken -o tsv)" >> $GITHUB_ENV

    - name: Fire and forget job
      run: |
        databricks bundle run medallion_job -t dev --no-wait
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}