# Shared ADLS Gen2 datastore - configuration for AzureML
$schema: https://azuremlschemas.azureedge.net/latest/azureDataLakeGen2.schema.json

name: {{SHARED_DATASTORE_NAME}}
type: azure_data_lake_gen2
description: "Shared ADLS Gen2 — used by both Databricks and AzureML"

account_name: {{STORAGE_ACCOUNT_NAME}}
filesystem: {{CONTAINER_NAME}}

# Service principal w/ RBAC - Storage Blob Data Contributor
credentials:
  client_id: {{SP_CLIENT_ID}}
  client_secret: __CLIENT_SECRET__
  tenant_id: {{SP_TENANT_ID}}
