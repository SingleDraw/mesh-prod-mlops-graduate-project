$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json

name: inference-env
version: {{INFERENCE_ENV_VERSION}}
description: "Inference environment for online endpoint"

image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04

conda_file:
  name: inference-env
  channels:
    - conda-forge
    - defaults
  dependencies:
    - python=3.10
    - pip:
      - azureml-inference-server-http==0.8.0
      - mlflow==2.9.2
      - xgboost==2.0.3
      - pandas==2.1.4
      - scikit-learn==1.3.2