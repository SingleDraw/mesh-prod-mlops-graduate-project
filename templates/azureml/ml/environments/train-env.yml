$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json

name: train-env
version: {{TRAIN_ENV_VERSION}}
description: "Training environment for churn classifier"

image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04

conda_file:
  name: train-env
  channels:
    - conda-forge
    - defaults
  dependencies:
    - python=3.10
    - pip:
      - azureml-mlflow==1.54.0
      - pandas==2.1.4
      - scikit-learn==1.3.2
      - xgboost==2.0.3
      - pyarrow==14.0.1
      - mlflow==2.9.2