name: upload-mltable-delta

on:
  workflow_dispatch:

env:
  SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: ${{ vars.AML_RESOURCE_GROUP }}
  WORKSPACE: ${{ vars.AML_WORKSPACE_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  upload-mltable:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- OIDC LOGIN ---
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Read config.yml and inject snapshot time
        run: |
          SNAPSHOT_TIME=$(yq e '.delta.snapshot_time' config.yml)
          find config/MLTable_template -name "*" -exec sed -i "s|__SNAPSHOT_TIME__|${SNAPSHOT_TIME}|g" {} +
          echo "SNAPSHOT_TIME=$SNAPSHOT_TIME" >> $GITHUB_ENV

      - name: Upload MLTable to datalake
        run: |
            az storage blob upload \
                --file config/MLTable_template \
                --name {{DELTA_MLTABLE_DIR}}/MLTable \
                --container-name {{CONTAINER_NAME}} \
                --account-name {{STORAGE_ACCOUNT_NAME}} \
                --auth-mode login \
                --overwrite true