services:
  jupyter-lab:
    image: singledraw-jupyterlab:latest
    ports:
      - 8888:8888
    user: "spark:spark"
    env_file:
      - ../.env
      - ../secrets/.datalake_sp_creds.env
    volumes:
      # notebooks
      - ${HOME}/notebooks/:/home/spark/notebooks/
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--allow-root", "--NotebookApp.token=''"]
    restart: unless-stopped